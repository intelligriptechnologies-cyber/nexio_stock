<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>BarStock Offline</title>
    <style>
      :root {
        color: #172554;
        background: #f8fafc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 16px 40px rgb(15 23 42 / 0.08);
      }

      img {
        width: 64px;
        height: 64px;
        display: block;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 10px;
        color: #0f172a;
        font-size: 1.5rem;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/barstock-icon-192.png" alt="" />
      <h1>BarStock is offline</h1>
      <p>Connect this tablet to the internet, then reopen the app to continue.</p>
    </main>
  </body>
</html>
