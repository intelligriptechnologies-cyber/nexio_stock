<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Barstock - PIN Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">

                      "on-secondary-container": "#5c2400",
                      "surface-container-low": "#f2f4f6",
                      "secondary-container": "#fd761a",
                      "on-tertiary-fixed-variant": "#005320",
                      "on-tertiary-fixed": "#002109",
                      "surface-container-lowest": "#ffffff",
                      "surface": "#f7f9fb",
                      "error-container": "#ffdad6",
                      "error": "#ba1a1a",
                      "primary-fixed-dim": "#bcc7de",
                      "outline-variant": "#c5c6cd",
                      "tertiary-fixed-dim": "#62df7d",
                      "primary-container": "#1e293b",
                      "inverse-primary": "#bcc7de",
                      "on-secondary-fixed-variant": "#783200",
                      "surface-container-highest": "#e0e3e5",
                      "tertiary-fixed": "#7ffc97",
                      "on-primary-fixed-variant": "#3c475a",
                      "outline": "#75777d",

                      "margin-desktop": "2.5rem",

<style>
        body {
            /* Prevent double-tap zoom on buttons for fast input */
            touch-action: manipulation;
        }
    </style>
</head>
<body class="bg-surface min-h-screen w-full flex flex-col justify-center items-center p-gutter selection:bg-secondary-container selection:text-on-primary">
<main class="w-full max-w-[420px] flex flex-col items-center gap-section-gap">
<!-- Header Section -->
<header class="flex flex-col items-center text-center gap-2 w-full">
<div class="h-[96px] w-[96px] rounded-full bg-surface-container-high flex items-center justify-center mb-2 border-2 border-outline-variant">
<span class="material-symbols-outlined text-primary" style="font-size: 56px; font-variation-settings: 'FILL' 1;">account_circle</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">Odisha Store #42</h1>
<p class="font-label-xl text-label-xl text-on-surface-variant">Enter Operator PIN</p>
</header>
<!-- PIN Display Area -->
<div aria-label="PIN entry display" class="flex gap-4 my-2">
<!-- Filled Dot -->
<div class="w-6 h-6 rounded-full bg-primary shadow-sm border border-primary"></div>
<!-- Filled Dot -->
<div class="w-6 h-6 rounded-full bg-primary shadow-sm border border-primary"></div>
<!-- Empty Dot -->
<div class="w-6 h-6 rounded-full border-2 border-outline-variant bg-surface-container-lowest"></div>
<!-- Empty Dot -->
<div class="w-6 h-6 rounded-full border-2 border-outline-variant bg-surface-container-lowest"></div>
</div>
<!-- Numpad Grid -->
<div aria-label="Numeric Keypad" class="grid grid-cols-3 gap-x-8 gap-y-6 w-full px-2" role="group">
<button class="w-[84px] h-[84px] mx-auto rounded-full bg-primary text-on-primary flex items-center justify-center font-display-lg text-display-lg active:bg-secondary-container active:scale-95 transition-all duration-75 select-none focus:outline-none focus:ring-4 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-surface">1</button>
<button class="w-[84px] h-[84px] mx-auto rounded-full bg-primary text-on-primary flex items-center justify-center font-display-lg text-display-lg active:bg-secondary-container active:scale-95 transition-all duration-75 select-none focus:outline-none focus:ring-4 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-surface">2</button>
<button class="w-[84px] h-[84px] mx-auto rounded-full bg-primary text-on-primary flex items-center justify-center font-display-lg text-display-lg active:bg-secondary-container active:scale-95 transition-all duration-75 select-none focus:outline-none focus:ring-4 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-surface">3</button>
<button class="w-[84px] h-[84px] mx-auto rounded-full bg-primary text-on-primary flex items-center justify-center font-display-lg text-display-lg active:bg-secondary-container active:scale-95 transition-all duration-75 select-none focus:outline-none focus:ring-4 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-surface">4</button>
<button class="w-[84px] h-[84px] mx-auto rounded-full bg-primary text-on-primary flex items-center justify-center font-display-lg text-display-lg active:bg-secondary-container active:scale-95 transition-all duration-75 select-none focus:outline-none focus:ring-4 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-surface">5</button>
<button class="w-[84px] h-[84px] mx-auto rounded-full bg-primary text-on-primary flex items-center justify-center font-display-lg text-display-lg active:bg-secondary-container active:scale-95 transition-all duration-75 select-none focus:outline-none focus:ring-4 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-surface">6</button>
<button class="w-[84px] h-[84px] mx-auto rounded-full bg-primary text-on-primary flex items-center justify-center font-display-lg text-display-lg active:bg-secondary-container active:scale-95 transition-all duration-75 select-none focus:outline-none focus:ring-4 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-surface">7</button>
<button class="w-[84px] h-[84px] mx-auto rounded-full bg-primary text-on-primary flex items-center justify-center font-display-lg text-display-lg active:bg-secondary-container active:scale-95 transition-all duration-75 select-none focus:outline-none focus:ring-4 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-surface">8</button>
<button class="w-[84px] h-[84px] mx-auto rounded-full bg-primary text-on-primary flex items-center justify-center font-display-lg text-display-lg active:bg-secondary-container active:scale-95 transition-all duration-75 select-none focus:outline-none focus:ring-4 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-surface">9</button>
<!-- Backspace -->
<button aria-label="Backspace" class="w-[84px] h-[84px] mx-auto rounded-full bg-surface-container-highest text-on-surface-variant border-2 border-outline-variant flex items-center justify-center active:bg-surface-dim active:scale-95 transition-all duration-75 select-none focus:outline-none focus:ring-4 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-surface">
<span class="material-symbols-outlined" style="font-size: 36px; font-variation-settings: 'FILL' 0;">backspace</span>
</button>
<button class="w-[84px] h-[84px] mx-auto rounded-full bg-primary text-on-primary flex items-center justify-center font-display-lg text-display-lg active:bg-secondary-container active:scale-95 transition-all duration-75 select-none focus:outline-none focus:ring-4 focus:ring-secondary-container focus:ring-offset-2 focus:ring-offset-surface">0</button>
<!-- Empty Placeholder to keep grid aligned -->
<div></div>
</div>
<!-- Action Area -->
<div class="w-full mt-4">
<!-- Using White text strictly per Brand Guidelines for Safety Orange button, mapping to on-primary (#ffffff) token -->
<button class="w-full h-[80px] bg-secondary-container text-on-primary rounded-lg flex items-center justify-center gap-2 font-headline-lg-mobile text-headline-lg-mobile shadow-md active:scale-[0.98] transition-transform duration-100 focus:outline-none focus:ring-4 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface">
                LOGIN
                <span class="material-symbols-outlined" style="font-size: 32px; font-variation-settings: 'FILL' 1;">login</span>
</button>
</div>
